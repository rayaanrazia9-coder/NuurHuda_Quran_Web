<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Juz List</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="juz.css">
</head>

<body class="dark">

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <header>
    <div class="container nav">

      <a class="brand" href="index.html">
        <span class="brand-logo">☪</span>
        <span class="brand-name">NuurHuda</span>
      </a>

      <div class="nav-right">
        <ul class="nav-desktop">
          <li><a href="index.html">Home</a></li>
          <li><a href="surah.html">Surah</a></li>
          <li><a href="juz.html">Juz</a></li>
          <li><a href="audio.html">Audio</a></li>
          <li><a href="about.html">About</a></li>
        </ul>

        <button id="hamburgerMenu" class="hamburger" aria-label="Toggle Navigation">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>

        <div id="dropdownMenu" class="dropdown-menu">
          <a href="index.html">Home</a>
          <a href="surah.html">Surah</a>
          <a href="juz.html">Juz</a>
          <a href="audio.html">Audio</a>
          <a href="reminder.html">Reminder</a>
          <a href="schedule.html">Schedule</a>
          <a href="about.html">About</a>
          <div class="dropdown-theme">
            <button id="themeToggle" class="toggle" aria-pressed="true">
              <span>Theme</span>
              <span class="mode">Dark</span>
            </button>
          </div>
        </div>
      </div>

    </div>
  </header>

  <button id="continueBtn" class="continue-btn" onclick="continueReading()">
    Continue Reading ▶
  </button>

  <div class="progress-header">
    <h3 id="progressText">0 / 30 Completed</h3>
    <button class="reset-btn" onclick="resetAll()">Reset All</button>
  </div>

  <div id="celebration" class="celebration">
    🎉 Juz Completed! May Allah reward you 🤍
  </div>

  <div class="container" id="juzContainer"></div>

  <button id="scrollToTop">↑</button>

  <script src="juz.js"></script>

  <script>
    applyTheme();
    initUI();
    setActiveNav();

    const container = document.getElementById('juzContainer');

    for (let i = 1; i <= 30; i++) {
      container.innerHTML += `
        <div class="box" data-juz="${i}" onclick="openJuz(${i})">
          <b>Juz ${i}</b>
          <button class="mark-btn" onclick="markComplete(event, ${i})">Mark Complete</button>
        </div>
      `;
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
