<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sections | The Grand Quran</title>
  <link rel="stylesheet" href="juz.css">
</head>
<body>
  <div id="progress-container"><div id="progress-bar"></div></div>
  
  <header>
    <div style="font-weight: 700;">THE GRAND QURAN</div>
    <nav><a href="index.html" style="color: white; text-decoration: none;">HOME</a></nav>
  </header>

  <div class="container" id="juzContainer">
    </div>

  <button id="scrollToTop">↑</button>

  <script src="juz.js"></script>
  <script>
    // Local script to generate boxes
    const container = document.getElementById('juzContainer');
    for(let i=1; i<=30; i++) {
      container.innerHTML += `
        <a href="reader.html?juz=${i}" class="box">
          <small>SECTION</small>
          <b>Juz ${i}</b>
        </a>
      `;
    }
    // Initialize common scroll features
    initScrollFeatures();
  </script>
</body>
