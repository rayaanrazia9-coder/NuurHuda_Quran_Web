<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NuurHuda • 30-Day Juz Plan</title>
  <link rel="stylesheet" href="schedule.css">
</head>
<body>

<header>
  <div class="container nav">
    <a class="brand" href="index.html">
      <span class="brand-logo">☪</span>
      <span class="brand-name">NuurHuda</span>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="surah.html">Surah</a></li>
        <li><a href="juz.html">Juz</a></li>
        <li><a href="Audio.html">Audio</a></li>
        <li><a href="reminder.html">Reminder</a></li>
        <li><a href="schedule.html" class="active">Schedule</a></li>
      </ul>
    </nav>
    <button id="themeBtn" class="theme-toggle" onclick="toggleTheme()">Dark Theme</button>
  </div>
</header>

<main class="centered-wrapper">
  <section class="ayah-card">
    <h1 class="plan-title">30-Day Quran Plan</h1>
    
    <div class="progress-section">
      <div class="progress-info">Overall Progress: <span id="percent">0%</span></div>
      <div class="progress-track-bg">
        <div id="progressBar" class="progress-fill-bar"></div>
      </div>
    </div>

    <div class="controls-group">
      <button id="viewList" class="btn">List View</button>
      <button id="viewCalendar" class="btn">Calendar View</button>
      <button id="prev" class="btn">Prev Week</button>
      <button id="next" class="btn">Next Week</button>
      <button id="reset" class="btn btn-danger">Reset</button>
    </div>

    <div id="viewLabel" class="status-label"></div>
    <div id="scheduleContainer"></div>
  </section>
</main>

<footer>
  <p>© <span id="year"></span> NuurHuda • May it be a light for you.</p>
</footer>

<script src="schedule.js"></script>
</body>
</html>
